<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Sports Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: white;
}

.quiz-container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 1s ease-in-out;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
}

.start-btn, .next-btn, .restart-btn {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    color: white;
}

.start-btn { background: #00c853; }
.next-btn { background: #ff9800; display: none; }
.restart-btn { background: #00c853; display: none; }

.question {
    font-size: 18px;
    margin-bottom: 15px;
}

.option-btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.option-btn:hover {
    transform: scale(1.05);
}

.correct { background-color: #4CAF50 !important; }
.wrong { background-color: #f44336 !important; }

.score-section {
    font-size: 20px;
    margin-top: 15px;
}

.hidden { display: none; }

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="quiz-container">
    <h1>🏆 Sports Quiz</h1>

    <!-- User Details Form -->
    <div id="userForm">
        <input type="text" id="name" placeholder="Enter Your Name" required>
        <input type="email" id="email" placeholder="Enter Your Email" required>
        <input type="number" id="age" placeholder="Enter Your Age" required>
        <input type="text" id="country" placeholder="Enter Your Country" required>
        <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz Section -->
    <div id="quizSection" class="hidden">
        <div class="question" id="question"></div>
        <div id="options"></div>
        <button class="next-btn" id="nextBtn">Next Question</button>
        <div class="score-section" id="scoreSection"></div>
        <button class="restart-btn" id="restartBtn">Restart Quiz</button>
    </div>
</div>

<script>
const quizData = [
    {
        question: "Which country won the FIFA World Cup 2018?",
        options: ["Brazil", "Germany", "France", "Argentina"],
        answer: "France"
    },
    {
        question: "How many players are there in a basketball team on court?",
        options: ["5", "6", "7", "11"],
        answer: "5"
    },
    {
        question: "Which player has won the most Grand Slam titles in men's tennis (as of 2024)?",
        options: ["Roger Federer", "Rafael Nadal", "Novak Djokovic", "Andy Murray"],
        answer: "Novak Djokovic"
    },
    {
        question: "In which sport is the term 'Hat-trick' commonly used?",
        options: ["Cricket", "Football", "Hockey", "All of the above"],
        answer: "All of the above"
    },
    {
        question: "Which country hosts the Tour de France?",
        options: ["Italy", "France", "Spain", "Belgium"],
        answer: "France"
    }
];

let currentQuestion = 0;
let score = 0;
let userName = "";

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreSection = document.getElementById("scoreSection");
const restartBtn = document.getElementById("restartBtn");

function startQuiz() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const age = document.getElementById("age").value;
    const country = document.getElementById("country").value;

    if (!name || !email || !age || !country) {
        alert("Please fill all details before starting the quiz!");
        return;
    }

    userName = name;
    document.getElementById("userForm").classList.add("hidden");
    document.getElementById("quizSection").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion() {
    nextBtn.style.display = "none";
    optionsEl.innerHTML = "";
    const currentQuiz = quizData[currentQuestion];
    questionEl.innerText = currentQuiz.question;

    currentQuiz.options.forEach(option => {
        const button = document.createElement("button");
        button.innerText = option;
        button.classList.add("option-btn");
        button.addEventListener("click", () => selectAnswer(button, currentQuiz.answer));
        optionsEl.appendChild(button);
    });
}

function selectAnswer(button, correctAnswer) {
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctAnswer) {
            btn.classList.add("correct");
        }
    });

    if (button.innerText === correctAnswer) {
        score++;
    } else {
        button.classList.add("wrong");
    }

    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        showScore();
    }
});

function showScore() {
    questionEl.innerText = "🎉 Quiz Completed!";
    optionsEl.innerHTML = "";
    nextBtn.style.display = "none";
    scoreSection.innerText = `${userName}, Your Score: ${score} / ${quizData.length}`;
    restartBtn.style.display = "inline-block";
}

restartBtn.addEventListener("click", () => {
    currentQuestion = 0;
    score = 0;
    scoreSection.innerText = "";
    restartBtn.style.display = "none";
    document.getElementById("quizSection").classList.add("hidden");
    document.getElementById("userForm").classList.remove("hidden");
});

</script>

</body>
</html>
