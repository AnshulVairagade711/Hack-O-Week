<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Panel</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.weather-card{
    width:320px;
    background: rgba(30,30,40,0.9);
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.city{
    font-size:22px;
    font-weight:600;
}

.date{
    color:#aaa;
    margin-bottom:15px;
}

.weather-icon{
    font-size:60px;
}

.temp{
    font-size:50px;
    font-weight:bold;
    margin:10px 0;
    color:#4fc3f7;
}

.desc{
    font-size:18px;
    color:#ddd;
    margin-bottom:20px;
}

.details{
    display:flex;
    justify-content:space-between;
}

.detail-box{
    background:#2a2a38;
    padding:12px;
    border-radius:10px;
    width:30%;
}

.label{
    font-size:12px;
    color:#9aa0a6;
}

.value{
    font-size:16px;
    font-weight:600;
}

</style>
</head>

<body>

<div class="weather-card">

<div class="city">Nagpur</div>
<div class="date">Thursday, 5 March</div>

<div class="weather-icon">🌙</div>

<div class="temp">28°C</div>
<div class="desc">Clear Night</div>

<div class="details">

<div class="detail-box">
<div class="label">Humidity</div>
<div class="value">52%</div>
</div>

<div class="detail-box">
<div class="label">Wind</div>
<div class="value">10 km/h</div>
</div>

<div class="detail-box">
<div class="label">Pressure</div>
<div class="value">1013 hPa</div>
</div>

</div>

</div>

</body>
</html>
